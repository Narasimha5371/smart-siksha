<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Smart Shiksha</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            border-right: 1px solid var(--border);
            padding: 20px;
        }

        .main-content {
            padding: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th {
            text-align: left;
            padding: 15px;
            color: #94A3B8;
            border-bottom: 1px solid var(--border);
        }

        .table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>

    <div class="dashboard-grid">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h3 class="gradient-text" style="margin-bottom: 40px;">Smart Dashboard</h3>
            <ul style="list-style: none;">
                <li style="margin-bottom: 15px; color: var(--primary); font-weight: bold;">Overview</li>
                <li style="margin-bottom: 15px; color: #94A3B8; cursor: pointer;">Students</li>
                <li style="margin-bottom: 15px; color: #94A3B8; cursor: pointer;">Analytics</li>
                <li style="margin-bottom: 15px; color: #94A3B8; cursor: pointer;">Settings</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; margin-bottom: 40px;">
                <h2>Class 10 - Science</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" style="background: rgba(255,255,255,0.1);">Export Report</button>
                    <button class="btn btn-primary">+ Add Assignment</button>
                </div>
            </header>

            <!-- Stats Row -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;">
                <div class="stat-card">
                    <h4 style="color: #94A3B8;">Avg Class Score</h4>
                    <h2 style="font-size: 2.5rem; margin-top: 10px;">78%</h2>
                </div>
                <div class="stat-card">
                    <h4 style="color: #94A3B8;">Active Students</h4>
                    <h2 style="font-size: 2.5rem; margin-top: 10px; color: var(--accent);">42/45</h2>
                </div>
                <div class="stat-card">
                    <h4 style="color: #94A3B8;">Tests Completed</h4>
                    <h2 style="font-size: 2.5rem; margin-top: 10px; color: var(--secondary);">156</h2>
                </div>
            </div>

            <!-- Student List -->
            <div class="glass-panel">
                <h3>Student Progress</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Status</th>
                            <th>Last Active</th>
                            <th>Avg Score</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        <!-- Populated by JS -->
                        <tr>
                            <td colspan="4" style="text-align: center;">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
